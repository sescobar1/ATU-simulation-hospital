<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ATU Simulation Hospital — Medication Administration</title>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<style>
:root{--green:#0d4b32;--green2:#176b49;--gold:#d7aa29;--bg:#eef2f4;--line:#aebbc3;--ink:#18242c;--muted:#5e6e78;--red:#a82434;--redbg:#fff0f2;--ok:#176f49;--okbg:#eaf7ef;--warn:#8a6715;--warnbg:#fff7d6}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink)}
button,input,select,textarea{font:inherit}button{cursor:pointer}
header{background:var(--green);color:#fff;padding:12px 16px;border-bottom:4px solid var(--gold);display:flex;justify-content:space-between;align-items:center}
header h1{font-size:19px;margin:0}header small{display:block;font-weight:normal;opacity:.85;margin-top:3px}
.badge{padding:5px 8px;border-radius:12px;background:#ffffff22;font-size:12px}
.layout{display:grid;grid-template-columns:270px 1fr;min-height:calc(100vh - 68px)}
aside{background:#173f32;color:#fff;padding:12px}
aside button{display:block;width:100%;text-align:left;border:0;background:transparent;color:#fff;padding:10px;border-radius:4px;margin:2px 0}
aside button.active,aside button:hover{background:#2b6b53}
main{min-width:0;padding:14px}.panel{background:#fff;border:1px solid var(--line);border-radius:5px;margin-bottom:12px;box-shadow:0 1px 2px #0001}
.panel h2{margin:0;background:#dde5e9;padding:9px 11px;border-bottom:1px solid var(--line);font-size:17px;color:#254451}
.body{padding:12px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
label{font-size:12px;font-weight:800}input,select,textarea{width:100%;padding:9px;border:1px solid #91a1ab;border-radius:3px;margin-top:4px}
textarea{min-height:100px}.primary{background:var(--green2);color:#fff;border:0;padding:9px 13px;border-radius:4px;font-weight:800}.secondary{background:#e6ecef;border:1px solid #91a1ab;padding:8px 12px;border-radius:4px}
.scanStep{border:2px solid #9eacb5;background:#fafcfd;padding:12px;border-radius:5px}.scanStep.complete{border-color:var(--ok);background:var(--okbg)}.scanStep.error{border-color:var(--red);background:var(--redbg)}
.scanStep h3{margin:0 0 7px}.feedback{margin-top:8px;padding:8px;border-radius:4px;font-weight:800}.feedback.ok{background:var(--okbg);color:var(--ok)}.feedback.bad{background:var(--redbg);color:var(--red)}.feedback.warn{background:var(--warnbg);color:var(--warn)}
.patientBanner{background:#fff;border:2px solid var(--green2);padding:10px;margin-bottom:12px}.patientBanner h2{margin:0;color:var(--green)}.patientMeta{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:8px;font-size:13px}.patientMeta span{display:block;color:var(--muted);font-size:10px;text-transform:uppercase;font-weight:800}
.allergy{color:var(--red);font-weight:900}.safety{padding:10px;border:2px solid var(--red);background:var(--redbg);color:var(--red);font-weight:900;margin:8px 0}.success{padding:10px;border:2px solid var(--ok);background:var(--okbg);color:var(--ok);font-weight:900;margin:8px 0}
.checks{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.check{display:flex;gap:8px;align-items:flex-start;border:1px solid var(--line);padding:8px;background:#fbfcfd}.check input{width:auto;margin:2px 0 0}
table{width:100%;border-collapse:collapse;font-size:13px}th,td{border:1px solid var(--line);padding:8px;text-align:left;vertical-align:top}th{background:#e7ecef}
.hidden{display:none!important}.barcodeCard{border:1px solid var(--line);padding:10px;margin:8px 0;background:#fff}
.labelControls{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:8px 0}
.labelPreview{border:1px dashed var(--line);padding:8px;background:#fafcfd;display:inline-block;max-width:100%}
.compactNote{font-size:11px;color:var(--muted);margin-top:5px}.actions{display:flex;gap:7px;flex-wrap:wrap}
.note{font-size:12px;color:var(--muted)}.modeBanner{padding:8px;background:#e9eef1;border:1px solid var(--line);margin-bottom:10px;font-size:12px}

.builderTabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.builderTabs button{border:1px solid var(--line);background:#e7ecef;padding:8px 11px;border-radius:4px}
.builderTabs button.active{background:var(--green2);color:white;border-color:var(--green2)}
.sectionTitle{margin:18px 0 8px;color:var(--green)}
.patientCards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.patientCard{border:1px solid var(--line);border-left:6px solid var(--green2);background:#fff;padding:12px;border-radius:5px}
.patientCard.inactive{opacity:.65;border-left-color:#7b8991}
.patientCard h3{margin:0 0 6px;color:var(--green)}
.patientCardMeta{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;font-size:12px;margin:8px 0}
.patientCardMeta span{display:block;color:var(--muted);font-size:10px;text-transform:uppercase;font-weight:800}
.resetBox{border:2px solid var(--warn);background:var(--warnbg);padding:10px;margin-top:10px}
@media(max-width:650px){.patientCards{grid-template-columns:1fr}}
.editRow{background:#fffdf0}
.dangerBtn{background:var(--red);color:white;border:0;padding:8px 11px;border-radius:4px}
.smallBtn{padding:5px 8px;font-size:12px}
.wide{grid-column:1/-1}
@media(max-width:820px){.layout{display:block}.patientMeta,.grid3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.grid,.grid3,.checks,.patientMeta{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
 <div><h1>ATU Simulation Hospital</h1><small>Embedded Medication Administration & Barcode Verification</small></div>
 <span class="badge" id="connectionBadge">Local Demonstration Mode</span>
</header>
<div class="layout">
<aside>
 <button data-view="patients" class="active">Active Patients</button>
 <button data-view="builder">Faculty Builder</button>
 <button data-view="admin">Medication Administration</button>
 <button data-view="mar">Patient MAR</button>
 <button data-view="blood">Blood Administration</button>
 <button data-view="bloodBuilder">Blood Product Builder</button>
 <button data-view="barcodes">Barcode Center</button>
 <button data-view="history">Administration History</button>
 <button data-view="settings">Notion Connection</button>
</aside>
<main>
 <div id="patientBanner" class="patientBanner hidden"></div>
 <section id="view"></section>
</main>
</div>
<script>
const SEED_PATIENTS=[{"id": "amelia-sung", "name": "Amelia Sung", "mrn": "SIM-201036", "dob": "12/08/XXXX", "room": "201", "provider": "Dr. Darnell", "allergies": ["penicillin", "shellfish"], "weightKg": 82, "barcode": "PT-SIM-201036"}, {"id": "jane-fowler", "name": "Jane Fowler", "mrn": "SIM-204051", "dob": "01/28/XXXX", "room": "204", "provider": "Dr. Smith", "allergies": [], "weightKg": 60, "barcode": "PT-SIM-204051"}];
const SEED_MEDS=[{"id": "cefazolin-2g", "patientId": "jane-fowler", "name": "Cefazolin", "dose": "2 g", "route": "IVPB", "frequency": "On call to OR", "scheduledTime": "On call to OR", "status": "Due", "barcode": "MED-CEFAZOLIN-2G", "allergyKeywords": ["cefazolin", "cephalosporin", "penicillin"], "highAlert": false, "indication": "Surgical prophylaxis"}, {"id": "metoclopramide-10", "patientId": "jane-fowler", "name": "Metoclopramide", "dose": "10 mg", "route": "IV", "frequency": "On call to OR", "scheduledTime": "On call to OR", "status": "Due", "barcode": "MED-METOCLOPRAMIDE-10MG", "allergyKeywords": ["metoclopramide"], "highAlert": false, "indication": "Preoperative nausea prevention"}, {"id": "oxytocin", "patientId": "amelia-sung", "name": "Oxytocin", "dose": "Per protocol", "route": "IV infusion", "frequency": "Continuous", "scheduledTime": "Active labor", "status": "Due", "barcode": "MED-OXYTOCIN-INFUSION", "allergyKeywords": ["oxytocin"], "highAlert": true, "indication": "Labor augmentation"}, {"id": "ampicillin", "patientId": "amelia-sung", "name": "Ampicillin", "dose": "2 g", "route": "IVPB", "frequency": "Every 4 hours", "scheduledTime": "0800", "status": "Due", "barcode": "MED-AMPICILLIN-2G", "allergyKeywords": ["ampicillin", "penicillin"], "highAlert": false, "indication": "GBS prophylaxis"}];
const STORAGE_KEY="atuNotionMedModuleV1";
let state=loadState();
let currentView="patients";
let verifiedPatient=null;
let verifiedMedication=null;

state.patients.forEach(p=>{if(typeof p.active!=="boolean")p.active=true});
state.patients.forEach(p=>{
 if(!p.barcode)p.barcode=`PT-${slugBarcode(p.mrn||p.name)}`;
});
state.medications.forEach(m=>{
 if(!m.initialStatus)m.initialStatus=m.status||"Due";
 if(!m.medType)m.medType="Scheduled";
 if(!m.barcode){
   const p=state.patients.find(x=>x.id===m.patientId);
   m.barcode=`MED-${slugBarcode(m.name)}-${slugBarcode(m.dose)}-${slugBarcode(p?.mrn||m.patientId)}`;
 }
});
state.bloodUnits ||= [];
state.bloodAdministrations ||= [];
state.bloodUnits.forEach(b=>{
 if(!b.initialStatus)b.initialStatus=b.status||"Available";
 if(!b.barcode)b.barcode=`BLOOD-${slugBarcode(b.product)}-${slugBarcode(b.unitType)}-${slugBarcode(b.unitNumber)}`;
});
save();

function loadState(){
 try{
  const saved=JSON.parse(localStorage.getItem(STORAGE_KEY)||"null");
  if(saved){
    saved.patients ||= [];
    saved.medications ||= [];
    saved.administrations ||= [];
    saved.bloodUnits ||= [];
    saved.bloodAdministrations ||= [];
    saved.patients.forEach(p=>{if(typeof p.active!=="boolean")p.active=true});
    saved.medications.forEach(m=>{
      if(!m.initialStatus)m.initialStatus=m.status||"Due";
      if(!m.medType)m.medType="Scheduled";
    });
    saved.settings ||= {bridgeUrl:"",notionEnabled:false};
    return saved;
  }
  return {patients:SEED_PATIENTS,medications:SEED_MEDS,administrations:[],bloodUnits:[],bloodAdministrations:[],settings:{bridgeUrl:"",notionEnabled:false}};
 }catch(e){return {patients:SEED_PATIENTS,medications:SEED_MEDS,administrations:[],bloodUnits:[],bloodAdministrations:[],settings:{bridgeUrl:"",notionEnabled:false}}}
}
function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}catch(e){}}
function esc(v){return String(v??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}
function nowLocal(){const d=new Date(),off=d.getTimezoneOffset();return new Date(d.getTime()-off*60000).toISOString().slice(0,16)}
function activePatient(){return verifiedPatient?state.patients.find(p=>p.id===verifiedPatient):null}
function patientMeds(id){return state.medications.filter(m=>m.patientId===id)}
function render(){
 document.querySelectorAll("aside button").forEach(b=>b.classList.toggle("active",b.dataset.view===currentView));
 renderPatientBanner();
 if(currentView==="patients")renderActivePatients();
 if(currentView==="builder")renderBuilder();
 if(currentView==="admin")renderAdmin();
 if(currentView==="mar")renderMar();
 if(currentView==="blood")renderBloodAdministration();
 if(currentView==="bloodBuilder")renderBloodBuilder();
 if(currentView==="barcodes")renderBarcodes();
 if(currentView==="history")renderHistory();
 if(currentView==="settings")renderSettings();
}
function renderPatientBanner(){
 const p=activePatient(),box=document.getElementById("patientBanner");
 if(!p){box.classList.add("hidden");return}
 box.classList.remove("hidden");
 box.innerHTML=`<h2>${esc(p.name)}</h2><div class="patientMeta">
 <div><span>MRN</span>${esc(p.mrn)}</div><div><span>DOB</span>${esc(p.dob)}</div><div><span>Room</span>${esc(p.room)}</div>
 <div><span>Provider</span>${esc(p.provider)}</div><div><span>Allergies</span><b class="${p.allergies.length?'allergy':''}">${p.allergies.length?esc(p.allergies.join(", ")):"NKDA"}</b></div></div>`;
}
function panel(title,body){return `<section class="panel"><h2>${title}</h2><div class="body">${body}</div></section>`}


function renderActivePatients(){
 const active=state.patients.filter(p=>p.active!==false);
 const inactive=state.patients.filter(p=>p.active===false);
 document.getElementById("view").innerHTML=
 panel("Active Patients",`
 <div class="actions" style="margin-bottom:10px">
  <button id="addPatientShortcut" class="primary">Add New Patient</button>
  <button id="resetAllActiveBtn" class="secondary">Reset All Active Simulations</button>
 </div>
 <div class="patientCards">
 ${active.map(patientCardHtml).join("")||'<div class="safety">No active patients. Add a patient in Faculty Builder.</div>'}
 </div>`) +
 (inactive.length?panel("Inactive Patients",`<div class="patientCards">${inactive.map(patientCardHtml).join("")}</div>`):"");
 document.getElementById("addPatientShortcut").onclick=()=>{currentView="builder";builderTab="patients";editingPatientId=null;render()};
 document.getElementById("resetAllActiveBtn").onclick=resetAllActiveSimulations;
 document.querySelectorAll(".openPatient").forEach(b=>b.onclick=()=>openPatientForAdministration(b.dataset.id));
 document.querySelectorAll(".resetPatient").forEach(b=>b.onclick=()=>resetPatientSimulation(b.dataset.id));
 document.querySelectorAll(".togglePatientActive").forEach(b=>b.onclick=()=>togglePatientActive(b.dataset.id));
}
function patientCardHtml(p){
 const meds=patientMeds(p.id);
 const due=meds.filter(m=>m.status==="Due").length;
 const given=meds.filter(m=>m.status==="Given").length;
 const administrations=state.administrations.filter(a=>a.patientId===p.id).length;
 return `<article class="patientCard ${p.active===false?"inactive":""}">
  <h3>${esc(p.name)}</h3>
  <div class="patientCardMeta">
   <div><span>MRN</span>${esc(p.mrn)}</div><div><span>Room</span>${esc(p.room)}</div>
   <div><span>Provider</span>${esc(p.provider)}</div><div><span>Allergies</span><b class="${p.allergies.length?"allergy":""}">${p.allergies.length?esc(p.allergies.join(", ")):"NKDA"}</b></div>
   <div><span>MAR</span>${meds.length} medication(s)</div><div><span>Status</span>${due} due • ${given} given</div>
   <div><span>Administrations</span>${administrations}</div><div><span>Patient Status</span>${p.active===false?"Inactive":"Active"}</div>
  </div>
  <div class="actions">
   <button class="primary openPatient" data-id="${esc(p.id)}" ${p.active===false?"disabled":""}>Open Medication Administration</button>
   <button class="secondary resetPatient" data-id="${esc(p.id)}">Reset Simulation</button>
   <button class="secondary togglePatientActive" data-id="${esc(p.id)}">${p.active===false?"Make Active":"Make Inactive"}</button>
  </div>
 </article>`;
}
function openPatientForAdministration(id){
 const p=state.patients.find(x=>x.id===id);
 if(!p||p.active===false)return;
 verifiedPatient=id;
 verifiedMedication=null;
 currentView="admin";
 render();
 setTimeout(()=>document.getElementById("medScan")?.focus(),50);
}
function resetPatientSimulation(id){
 const p=state.patients.find(x=>x.id===id);
 if(!p)return;
 const medCount=state.medications.filter(m=>m.patientId===id).length;
 const adminCount=state.administrations.filter(a=>a.patientId===id).length;
 if(!confirm(`Reset ${p.name}'s simulation?\n\nThis will:\n• Return ${medCount} medication order(s) to their starting MAR status\n• Delete ${adminCount} administration record(s) for this patient\n• Keep the patient, MAR, barcodes, and medication orders for reuse`))return;
 state.medications.filter(m=>m.patientId===id).forEach(m=>{
   m.status=m.initialStatus||"Due";
 });
 state.administrations=state.administrations.filter(a=>a.patientId!==id);
 state.bloodUnits.filter(b=>b.patientId===id).forEach(b=>b.status=b.initialStatus||"Available");
 state.bloodAdministrations=state.bloodAdministrations.filter(a=>a.patientId!==id);
 if(verifiedPatient===id){verifiedMedication=null}
 save();
 alert(`${p.name}'s simulation has been reset. The same MAR is ready for the next student.`);
 render();
}
function resetAllActiveSimulations(){
 const active=state.patients.filter(p=>p.active!==false);
 if(!active.length)return alert("There are no active patients to reset.");
 if(!confirm(`Reset all ${active.length} active patient simulations?\n\nPatients and medication orders will be kept. Administration records will be cleared and MAR statuses restored.`))return;
 const ids=new Set(active.map(p=>p.id));
 state.medications.forEach(m=>{if(ids.has(m.patientId))m.status=m.initialStatus||"Due"});
 state.administrations=state.administrations.filter(a=>!ids.has(a.patientId));
 state.bloodUnits.forEach(b=>{if(ids.has(b.patientId))b.status=b.initialStatus||"Available"});
 state.bloodAdministrations=state.bloodAdministrations.filter(a=>!ids.has(a.patientId));
 verifiedMedication=null;
 save();
 alert("All active simulations have been reset.");
 render();
}
function togglePatientActive(id){
 const p=state.patients.find(x=>x.id===id);
 if(!p)return;
 p.active=p.active===false;
 if(p.active===false&&verifiedPatient===id){verifiedPatient=null;verifiedMedication=null}
 save();renderActivePatients();
}

let builderTab="patients";
let editingPatientId=null;
let editingMedicationId=null;

function uid(prefix){
 return `${prefix}-${Date.now()}-${Math.random().toString(36).slice(2,7)}`;
}
function slugBarcode(value){
 return String(value||"ITEM").toUpperCase().trim().replace(/[^A-Z0-9]+/g,"-").replace(/^-+|-+$/g,"");
}
function parseKeywords(value){
 return String(value||"").split(",").map(x=>x.trim().toLowerCase()).filter(Boolean);
}
function patientOptions(selected=""){
 return state.patients.map(p=>`<option value="${esc(p.id)}" ${p.id===selected?"selected":""}>${esc(p.name)} — ${esc(p.mrn)}</option>`).join("");
}
function renderBuilder(){
 const view=document.getElementById("view");
 view.innerHTML=`
 <div class="builderTabs">
  <button id="patientTabBtn" class="${builderTab==="patients"?"active":""}">Patients</button>
  <button id="medTabBtn" class="${builderTab==="medications"?"active":""}">Medication Orders</button>
 </div>
 <div id="builderContent"></div>`;
 document.getElementById("patientTabBtn").onclick=()=>{builderTab="patients";editingPatientId=null;renderBuilder()};
 document.getElementById("medTabBtn").onclick=()=>{builderTab="medications";editingMedicationId=null;renderBuilder()};
 if(builderTab==="patients")renderPatientBuilder();
 else renderMedicationBuilder();
}
function renderPatientBuilder(){
 const p=editingPatientId?state.patients.find(x=>x.id===editingPatientId):null;
 document.getElementById("builderContent").innerHTML=
 panel(p?"Edit Patient":"Add Patient",`
 <div class="grid">
  <label>Patient Name<input id="pbName" value="${esc(p?.name||"")}"></label>
  <label>MRN<input id="pbMrn" value="${esc(p?.mrn||"")}"></label>
  <label>Date of Birth<input id="pbDob" value="${esc(p?.dob||"")}"></label>
  <label>Room Number<input id="pbRoom" value="${esc(p?.room||"")}"></label>
  <label>Provider<input id="pbProvider" value="${esc(p?.provider||"")}"></label>
  <label>Weight (kg)<input id="pbWeight" type="number" step="0.1" value="${esc(p?.weightKg||"")}"></label>
  <label class="wide">Allergies — separate with commas<input id="pbAllergies" value="${esc((p?.allergies||[]).join(", "))}" placeholder="penicillin, shellfish"></label>
  <label>Patient Barcode<input id="pbBarcode" value="${esc(p?.barcode||"")}" placeholder="Generated automatically if blank"></label>
  <label>Patient Status<select id="pbActive"><option value="true" ${p?.active===false?"":"selected"}>Active</option><option value="false" ${p?.active===false?"selected":""}>Inactive</option></select></label>
 </div>
 <div class="actions" style="margin-top:10px">
  <button id="savePatientBtn" class="primary">${p?"Save Patient Changes":"Add Patient"}</button>
  ${p?'<button id="cancelPatientEditBtn" class="secondary">Cancel Edit</button>':""}
 </div>
 <div id="patientBuilderFeedback"></div>`) +
 panel("Current Patients",`
 <table><thead><tr><th>Name</th><th>MRN</th><th>DOB</th><th>Room</th><th>Provider</th><th>Allergies</th><th>Status</th><th>Barcode</th><th>Actions</th></tr></thead>
 <tbody>${state.patients.map(x=>`<tr class="${x.id===editingPatientId?"editRow":""}">
 <td><b>${esc(x.name)}</b></td><td>${esc(x.mrn)}</td><td>${esc(x.dob)}</td><td>${esc(x.room)}</td><td>${esc(x.provider)}</td>
 <td class="${x.allergies.length?"allergy":""}">${x.allergies.length?esc(x.allergies.join(", ")):"NKDA"}</td><td>${x.active===false?"Inactive":"Active"}</td><td>${esc(x.barcode)}</td>
 <td><div class="actions"><button class="secondary smallBtn editPatient" data-id="${esc(x.id)}">Edit</button><button class="dangerBtn smallBtn deletePatient" data-id="${esc(x.id)}">Delete</button></div></td>
 </tr>`).join("")||'<tr><td colspan="9">No patients entered.</td></tr>'}</tbody></table>`);
 document.getElementById("savePatientBtn").onclick=savePatientFromBuilder;
 document.getElementById("cancelPatientEditBtn")?.addEventListener("click",()=>{editingPatientId=null;renderPatientBuilder()});
 document.querySelectorAll(".editPatient").forEach(b=>b.onclick=()=>{editingPatientId=b.dataset.id;renderPatientBuilder()});
 document.querySelectorAll(".deletePatient").forEach(b=>b.onclick=()=>deletePatient(b.dataset.id));
}
function savePatientFromBuilder(){
 const name=document.getElementById("pbName").value.trim();
 const mrn=document.getElementById("pbMrn").value.trim();
 const dob=document.getElementById("pbDob").value.trim();
 const room=document.getElementById("pbRoom").value.trim();
 const provider=document.getElementById("pbProvider").value.trim();
 const weightKg=Number(document.getElementById("pbWeight").value||0);
 const allergies=parseKeywords(document.getElementById("pbAllergies").value);
 const active=document.getElementById("pbActive").value==="true";
 let barcode=document.getElementById("pbBarcode").value.trim();

 const missing=[];
 if(!name)missing.push("Patient name");
 if(!mrn)missing.push("MRN");
 if(!dob)missing.push("Date of birth");
 if(!room)missing.push("Room number");
 if(!provider)missing.push("Provider");
 if(missing.length){
  alert(`Enter the following before saving:\n\n• ${missing.join("\n• ")}`);
  return;
 }
 const duplicate=state.patients.find(x=>x.mrn.toLowerCase()===mrn.toLowerCase()&&x.id!==editingPatientId);
 if(duplicate)return alert("That MRN is already assigned to another patient.");
 if(!barcode)barcode=`PT-${slugBarcode(mrn)}`;

 if(editingPatientId){
  const p=state.patients.find(x=>x.id===editingPatientId);
  Object.assign(p,{name,mrn,dob,room,provider,weightKg,allergies,barcode,active});
 }else{
  state.patients.push({id:uid("patient"),name,mrn,dob,room,provider,weightKg,allergies,barcode,active});
 }
 save();editingPatientId=null;renderPatientBuilder();
}
function deletePatient(id){
 const p=state.patients.find(x=>x.id===id);
 const meds=state.medications.filter(m=>m.patientId===id).length;
 if(!confirm(`Delete ${p?.name||"this patient"}?\n\nThis will also delete ${meds} medication order(s) assigned to the patient.`))return;
 state.patients=state.patients.filter(x=>x.id!==id);
 state.medications=state.medications.filter(x=>x.patientId!==id);

function saveMedicationFromBuilder(){
 const patientId=document.getElementById("mbPatient").value;

 const dose=document.getElementById("mbDose").value.trim();
 const route=document.getElementById("mbRoute").value;
 const frequency=document.getElementById("mbFrequency").value.trim();
 const scheduledTime=document.getElementById("mbTime").value.trim();
 const indication=document.getElementById("mbIndication").value.trim();
 const provider=document.getElementById("mbProvider").value.trim();
 const status=document.getElementById("mbStatus").value;
 const allergyKeywords=parseKeywords(document.getElementById("mbAllergyKeywords").value);
 const highAlert=document.getElementById("mbHighAlert").value==="true";
 let barcode=document.getElementById("mbBarcode").value.trim();
 const notes=document.getElementById("mbNotes").value.trim();

 const missing=[];
 if(!patientId)missing.push("Patient");
 if(!name)missing.push("Medication name");
 if(!dose)missing.push("Dose");
 if(!route)missing.push("Route");
 if(!frequency)missing.push("Frequency");
 if(!scheduledTime)missing.push("Scheduled time");
 if(!provider)missing.push("Provider");
 if(medType==="PRN"&&!indication)missing.push("PRN indication");
 if(missing.length){
  alert(`Enter the following before saving:\n\n• ${missing.join("\n• ")}`);

 }
 if(!barcode){
  const p=state.patients.find(x=>x.id===patientId);
  barcode=`MED-${slugBarcode(name)}-${slugBarcode(dose)}-${slugBarcode(p?.mrn||patientId)}`;
 }
 const duplicate=state.medications.find(x=>x.barcode===barcode&&x.id!==editingMedicationId);
 if(duplicate)return alert("That medication barcode is already in use.");

 const record={patientId,medType,name,dose,route,frequency,scheduledTime,indication,provider,status,initialStatus:status,allergyKeywords,highAlert,barcode,notes};
 if(editingMedicationId)Object.assign(state.medications.find(x=>x.id===editingMedicationId),record);
 else state.medications.push({id:uid("med"),...record});
 save();editingMedicationId=null;renderMedicationBuilder();

const RBC_COMPATIBILITY={
 "O-":["O-"],
 "O+":["O-","O+"],
 "A-":["O-","A-"],
 "A+":["O-","O+","A-","A+"],
 "B-":["O-","B-"],
 "B+":["O-","O+","B-","B+"],
 "AB-":["O-","A-","B-","AB-"],
 "AB+":["O-","O+","A-","A+","B-","B+","AB-","AB+"]
};
function isBloodCompatible(patientType,unitType,product){
 if(!patientType||!unitType)return false;
 if(product==="Fresh Frozen Plasma"){
   const plasma={
    "O-":["O-","O+","A-","A+","B-","B+","AB-","AB+"],
    "O+":["O+","A+","B+","AB+"],
    "A-":["A-","A+","AB-","AB+"],
    "A+":["A+","AB+"],
    "B-":["B-","B+","AB-","AB+"],
    "B+":["B+","AB+"],
    "AB-":["AB-","AB+"],
    "AB+":["AB+"]
   };
   return (plasma[unitType]||[]).includes(patientType);
 }
 if(product==="Platelets")return true;
 return (RBC_COMPATIBILITY[patientType]||[]).includes(unitType);
}

 const ps=document.getElementById("bloodPatientScan"),us=document.getElementById("bloodUnitScan");
 ps.onkeydown=e=>{if(e.key==="Enter"){verifyBloodPatient(ps.value.trim());ps.value=""}};
 us.onkeydown=e=>{if(e.key==="Enter"){verifyBloodUnitScan(us.value.trim());us.value=""}};
 setTimeout(()=>ps.focus(),50);
}
function verifyBloodPatient(code){
 const p=state.patients.find(p=>(p.barcode===code||p.mrn===code)&&p.active!==false);
 const fb=document.getElementById("bloodPatientFeedback"),step=document.getElementById("bloodPatientStep");
 if(!p){verifiedBloodPatient=null;verifiedBloodUnit=null;step.className="scanStep error";fb.className="feedback bad";fb.textContent="PATIENT MISMATCH: Wristband not recognized.";return}
 verifiedBloodPatient=p.id;verifiedBloodUnit=null;step.className="scanStep complete";fb.className="feedback ok";fb.textContent=`Patient verified: ${p.name}, MRN ${p.mrn}.`;
 renderBloodAdministration();setTimeout(()=>document.getElementById("bloodUnitScan")?.focus(),50);
}
function verifyBloodUnitScan(code){
 const p=state.patients.find(x=>x.id===verifiedBloodPatient);
 const fb=document.getElementById("bloodUnitFeedback"),step=document.getElementById("bloodUnitStep");
 const b=state.bloodUnits.find(x=>x.barcode===code);
 if(!b){verifiedBloodUnit=null;step.className="scanStep error";fb.className="feedback bad";fb.textContent="BLOOD UNIT NOT FOUND.";return}
 if(b.patientId!==p.id){verifiedBloodUnit=null;step.className="scanStep error";fb.className="feedback bad";fb.textContent="WRONG PATIENT: This blood unit is assigned to another patient.";return}
 verifiedBloodUnit=b.id;step.className="scanStep complete";fb.className="feedback ok";fb.textContent=`Blood unit verified: ${b.product}, ${b.unitType}, unit ${b.unitNumber}.`;
 document.getElementById("bloodVerificationArea").innerHTML=bloodVerificationHtml(p,b);bindBloodVerification();
}
function bloodVerificationHtml(p,b){
 const compatible=isBloodCompatible(p.bloodType||"",b.unitType,b.product);
 const expired=b.expiration&&new Date(b.expiration)<new Date();
 return panel("Blood Safety Verification",`
 ${!p.bloodType?'<div class="safety">PATIENT BLOOD TYPE MISSING: Enter the patient blood type before transfusion verification.</div>':""}
 ${p.bloodType&&!compatible?`<div class="safety">INCOMPATIBLE BLOOD PRODUCT: Patient ${esc(p.bloodType)} cannot receive ${esc(b.unitType)} ${esc(b.product)}.</div>`:""}
 ${expired?'<div class="safety">EXPIRED BLOOD PRODUCT: Do not transfuse.</div>':""}
 ${compatible&&!expired?'<div class="success">Blood type and product compatibility verified.</div>':""}
 <div class="grid3">
  <div><b>Patient Blood Type</b><p>${esc(p.bloodType||"Not entered")}</p></div>
  <div><b>Product</b><p>${esc(b.product)}</p></div>
  <div><b>Unit Blood Type</b><p>${esc(b.unitType)}</p></div>
  <div><b>Unit Number</b><p>${esc(b.unitNumber)}</p></div>
  <div><b>Expiration</b><p>${esc(b.expiration)}</p></div>
  <div><b>Status</b><p>${esc(b.status)}</p></div>
 </div>
 <h3>Required checks</h3>
 <div class="checks">
 ${["Provider order verified","Consent verified","Patient wristband matches","Blood unit label matches","ABO/Rh compatibility verified","Unit number verified","Expiration verified","Baseline vital signs obtained","IV access patent","Two-person verification completed"].map((x,i)=>`<label class="check"><input type="checkbox" class="bloodCheck" id="bloodCheck${i}"><span>${x}</span></label>`).join("")}
 </div>
 <div class="grid" style="margin-top:10px">
  <label>Primary Student Nurse<input id="bloodStudent1"></label>
  <label>Second Verifier<input id="bloodStudent2"></label>
  <label>Start Date/Time<input id="bloodStart" type="datetime-local" value="${nowLocal()}"></label>
  <label>IV Site / Line<input id="bloodSite"></label>
  <label>Baseline Vitals<input id="bloodVitals" placeholder="T, HR, RR, BP, SpO₂"></label>
  <label>Notes<input id="bloodNotes"></label>
 </div>
 <div class="actions" style="margin-top:10px">
  <button id="startBloodBtn" class="primary" ${(!compatible||expired||!p.bloodType)?"disabled":""}>Start Blood Administration</button>
  <button id="cancelBloodBtn" class="secondary">Cancel</button>
 </div>
 <div id="bloodAdminFeedback"></div>`);
}
function bindBloodVerification(){
 document.getElementById("cancelBloodBtn").onclick=()=>{verifiedBloodUnit=null;renderBloodAdministration()};
 document.getElementById("startBloodBtn").onclick=startBloodAdministration;
}
function startBloodAdministration(){
 const p=state.patients.find(x=>x.id===verifiedBloodPatient),b=state.bloodUnits.find(x=>x.id===verifiedBloodUnit);
 if([...document.querySelectorAll(".bloodCheck")].some(c=>!c.checked))return showBloodFeedback("Complete all required blood safety checks.",false);
 const student1=document.getElementById("bloodStudent1").value.trim(),student2=document.getElementById("bloodStudent2").value.trim();
 if(!student1||!student2)return showBloodFeedback("Enter both the primary student and second verifier.",false);
 const record={id:uid("bloodAdmin"),patientId:p.id,patientName:p.name,mrn:p.mrn,bloodUnitId:b.id,product:b.product,unitType:b.unitType,unitNumber:b.unitNumber,barcode:b.barcode,startedAt:document.getElementById("bloodStart").value,student1,student2,site:document.getElementById("bloodSite").value.trim(),baselineVitals:document.getElementById("bloodVitals").value.trim(),notes:document.getElementById("bloodNotes").value.trim(),status:"Started"};
 state.bloodAdministrations.push(record);b.status="Transfusing";save();showBloodFeedback("Blood administration started and documented.",true);verifiedBloodUnit=null;setTimeout(renderBloodAdministration,1200);
}
function showBloodFeedback(text,ok){const b=document.getElementById("bloodAdminFeedback");b.className=ok?"success":"safety";b.textContent=text}

function renderBarcodes(){
 document.getElementById("view").innerHTML=panel("Barcode Center",`
 <div class="modeBanner">Barcodes are generated automatically for every patient and medication. Medication labels can be printed in compact sizes for medication cups, syringes, bags, vials, and simulation containers.</div>
 <h3>Patient Wristbands</h3>
 ${state.patients.map(p=>`<div class="barcodeCard">
   <b>${esc(p.name)}</b>
   <p>${esc(p.mrn)} • DOB ${esc(p.dob)} • Room ${esc(p.room)} • Provider ${esc(p.provider)}</p>
   <div class="labelControls">
    <label>Label Size<select class="patientLabelSize" data-id="${esc(p.id)}">
      <option value="standard">Wristband / Standard</option>
      <option value="medium">Medium</option>
      <option value="small">Small</option>
    </select></label>
    <label>Copies<input class="patientLabelCopies" data-id="${esc(p.id)}" type="number" min="1" max="50" value="1"></label>
    <div style="align-self:end"><button class="secondary printPatientLabel" data-id="${esc(p.id)}">Print Patient Barcode</button></div>
   </div>
   <div class="compactNote">Barcode: ${esc(p.barcode)}</div>
 </div>`).join("")}
 <h3>Medication Labels</h3>
 ${state.medications.map(m=>{
   const p=state.patients.find(x=>x.id===m.patientId);
   return `<div class="barcodeCard">
    <b>${esc(m.name)} ${esc(m.dose)}</b>
    <p>${esc(m.route)} • ${esc(m.frequency)} • Patient: ${esc(p?.name||"Unknown")}</p>
    <div class="labelControls">
      <label>Label Size<select class="medLabelSize" data-id="${esc(m.id)}">
        <option value="tiny">Tiny — 1.5 × 0.75 in</option>
        <option value="small" selected>Small — 2 × 1 in</option>
        <option value="medium">Medium — 2.625 × 1 in</option>
        <option value="standard">Standard — 3.5 × 1.25 in</option>
      </select></label>
      <label>Copies<input class="medLabelCopies" data-id="${esc(m.id)}" type="number" min="1" max="100" value="6"></label>
      <div style="align-self:end"><button class="primary printMedicationLabel" data-id="${esc(m.id)}">Print Medication Labels</button></div>
    </div>
    <div class="compactNote">Barcode: ${esc(m.barcode)}</div>
   </div>`;
 }).join("")||"<p>No medications entered.</p>"}
 <h3>Blood Product Labels</h3>
 ${state.bloodUnits.map(b=>{
   const p=state.patients.find(x=>x.id===b.patientId);
   return `<div class="barcodeCard">
    <b>${esc(b.product)} — ${esc(b.unitType)} — Unit ${esc(b.unitNumber)}</b>
    <p>Patient: ${esc(p?.name||"Unknown")} • Expires: ${esc(b.expiration||"—")}</p>
    <div class="labelControls">
      <label>Label Size<select class="bloodLabelSize" data-id="${esc(b.id)}">
        <option value="small" selected>Small — 2 × 1 in</option>
        <option value="medium">Medium — 2.625 × 1 in</option>
        <option value="standard">Standard — 3.5 × 1.25 in</option>
      </select></label>
      <label>Copies<input class="bloodLabelCopies" data-id="${esc(b.id)}" type="number" min="1" max="50" value="2"></label>
      <div style="align-self:end"><button class="primary printBloodLabel" data-id="${esc(b.id)}">Print Blood Labels</button></div>
    </div>
    <div class="compactNote">Barcode: ${esc(b.barcode)}</div>
   </div>`;
 }).join("")||"<p>No blood products entered.</p>"}
`);
 document.querySelectorAll(".printPatientLabel").forEach(b=>b.onclick=()=>{
   const p=state.patients.find(x=>x.id===b.dataset.id);
   const size=document.querySelector(`.patientLabelSize[data-id="${b.dataset.id}"]`).value;
   const copies=document.querySelector(`.patientLabelCopies[data-id="${b.dataset.id}"]`).value;
   printLabelSheet({
     title:p.name,
     code:p.barcode,
     details:`MRN ${p.mrn} | DOB ${p.dob} | Room ${p.room} | ${p.provider}`,
     labelType:"patient",size,copies
   });
 });
 document.querySelectorAll(".printMedicationLabel").forEach(b=>b.onclick=()=>{
   const m=state.medications.find(x=>x.id===b.dataset.id);
   const p=state.patients.find(x=>x.id===m.patientId);
   const size=document.querySelector(`.medLabelSize[data-id="${b.dataset.id}"]`).value;
   const copies=document.querySelector(`.medLabelCopies[data-id="${b.dataset.id}"]`).value;
   printLabelSheet({
     title:`${m.name} ${m.dose}`,
     code:m.barcode,
     details:`${m.route} | ${m.frequency} | ${p?.name||""}`,
     labelType:"medication",size,copies
   });
 });
 document.querySelectorAll(".printBloodLabel").forEach(btn=>btn.onclick=()=>{
   const b=state.bloodUnits.find(x=>x.id===btn.dataset.id);
   const p=state.patients.find(x=>x.id===b.patientId);
   const size=document.querySelector(`.bloodLabelSize[data-id="${btn.dataset.id}"]`).value;
   const copies=document.querySelector(`.bloodLabelCopies[data-id="${btn.dataset.id}"]`).value;
   printLabelSheet({
     title:`${b.product} ${b.unitType}`,
     code:b.barcode,
     details:`Unit ${b.unitNumber} | ${p?.name||""} | Exp ${b.expiration||""}`,
     labelType:"blood",size,copies
   });
 });
}
function renderHistory(){
 const rows=state.administrations.slice().reverse().map(a=>`<tr><td>${esc(a.administeredAt)}</td><td>${esc(a.patientName)}</td><td>${esc(a.medication)} ${esc(a.dose)}</td><td>${esc(a.route)}</td><td>${esc(a.student)}</td><td>${esc(a.site)}</td><td>${esc(a.notes)}</td></tr>`).join("");
 document.getElementById("view").innerHTML=panel("Medication Administration History",`<table><thead><tr><th>Date/Time</th><th>Patient</th><th>Medication</th><th>Route</th><th>Student</th><th>Site</th><th>Notes</th></tr></thead><tbody>${rows||`<tr><td colspan="7">No administrations documented.</td></tr>`}</tbody></table>`);
}
function renderSettings(){
 document.getElementById("view").innerHTML=panel("Notion Connection",`
 <div class="modeBanner">Do not place a Notion secret token in this webpage. The app sends documentation to a secure bridge URL that stores the token on the server.</div>
 <div class="grid">
 <label>Notion Bridge URL<input id="bridgeUrl" value="${esc(state.settings.bridgeUrl)}" placeholder="https://your-worker.workers.dev"></label>
 <label>Connection Mode<select id="notionEnabled"><option value="false">Local demonstration mode</option><option value="true">Send administrations to Notion</option></select></label>
 </div>
 <div class="actions" style="margin-top:10px"><button id="saveSettings" class="primary">Save Connection Settings</button><button id="resetAllSimulationsSettings" class="secondary">Reset All Patient Simulations</button><button id="resetDemo" class="dangerBtn">Delete All Local Data</button></div>
 <p class="note">The Faculty Builder saves patients and medication orders in this browser. The included notion-worker.js is a starter secure bridge for completed administrations. Add your Notion token and Medication Administration database ID as protected environment variables on the hosting service.</p>`);
 document.getElementById("notionEnabled").value=String(state.settings.notionEnabled);
 document.getElementById("saveSettings").onclick=()=>{state.settings.bridgeUrl=document.getElementById("bridgeUrl").value.trim();state.settings.notionEnabled=document.getElementById("notionEnabled").value==="true";save();updateConnectionBadge();alert("Connection settings saved.")};
 document.getElementById("resetAllSimulationsSettings").onclick=()=>{
   if(!confirm("Reset every patient simulation while keeping all patients and medication orders?"))return;
   state.medications.forEach(m=>m.status=m.initialStatus||"Due");
   state.administrations=[];state.bloodUnits.forEach(b=>b.status=b.initialStatus||"Available");state.bloodAdministrations=[];
   verifiedPatient=null;verifiedMedication=null;save();alert("All simulations reset.");renderSettings();
 };
 document.getElementById("resetDemo").onclick=()=>{if(confirm("DELETE all local patients, medications, and administration records? This cannot be undone.")){localStorage.removeItem(STORAGE_KEY);location.reload()}};
}
function updateConnectionBadge(){
 const b=document.getElementById("connectionBadge");
 b.textContent=state.settings.notionEnabled&&state.settings.bridgeUrl?"Notion Write-Back Enabled":"Local Demonstration Mode";
}
document.querySelectorAll("aside button").forEach(b=>b.onclick=()=>{currentView=b.dataset.view;render()});
updateConnectionBadge();render();
</script>
</body>
</html>
