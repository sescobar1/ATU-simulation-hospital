<html lang="en">
<head>
<meta charset="utf-8">

<title>ATU Simulation Hospital — Medication Administration</title>

<style>
:root{--green:#0d4b32;--green2:#176b49;--gold:#d7aa29;--bg:#eef2f4;--line:#aebbc3;--ink:#18242c;--muted:#5e6e78;--red:#a82434;--redbg:#fff0f2;--ok:#176f49;--okbg:#eaf7ef;--warn:#8a6715;--warnbg:#fff7d6}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink)}
button,input,select,textarea{font:inherit}button{cursor:pointer}
header{background:var(--green);color:#fff;padding:12px 16px;border-bottom:4px solid var(--gold);display:flex;justify-content:space-between;align-items:center}
header h1{font-size:19px;margin:0}header small{display:block;font-weight:normal;opacity:.85;margin-top:3px}
.badge{padding:5px 8px;border-radius:12px;background:#ffffff22;font-size:12px}.badge.saved{background:#dff4e7;color:#125c3b}.badge.error{background:#ffe2e5;color:#8a1d2c}.storageHelp{border:1px solid var(--line);background:#f7fafb;padding:10px;margin-top:10px}
.layout{display:grid;grid-template-columns:270px 1fr;min-height:calc(100vh - 68px)}
aside{background:#173f32;color:#fff;padding:12px}
aside button{display:block;width:100%;text-align:left;border:0;background:transparent;color:#fff;padding:10px;border-radius:4px;margin:2px 0}
aside button.active,aside button:hover{background:#2b6b53}
main{min-width:0;padding:14px}.panel{background:#fff;border:1px solid var(--line);border-radius:5px;margin-bottom:12px;box-shadow:0 1px 2px #0001}
.panel h2{margin:0;background:#dde5e9;padding:9px 11px;border-bottom:1px solid var(--line);font-size:17px;color:#254451}
.body{padding:12px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
label{font-size:12px;font-weight:800}input,select,textarea{width:100%;padding:9px;border:1px solid #91a1ab;border-radius:3px;margin-top:4px}
textarea{min-height:100px}.primary{background:var(--green2);color:#fff;border:0;padding:9px 13px;border-radius:4px;font-weight:800}.secondary{background:#e6ecef;border:1px solid #91a1ab;padding:8px 12px;border-radius:4px}
.scanStep{border:2px solid #9eacb5;background:#fafcfd;padding:12px;border-radius:5px}.scanStep.complete{border-color:var(--ok);background:var(--okbg)}.scanStep.error{border-color:var(--red);background:var(--redbg)}
.scanStep h3{margin:0 0 7px}.feedback{margin-top:8px;padding:8px;border-radius:4px;font-weight:800}.feedback.ok{background:var(--okbg);color:var(--ok)}.feedback.bad{background:var(--redbg);color:var(--red)}.feedback.warn{background:var(--warnbg);color:var(--warn)}
.patientBanner{background:#fff;border:2px solid var(--green2);padding:10px;margin-bottom:12px}.patientBanner h2{margin:0;color:var(--green)}.patientMeta{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:8px;font-size:13px}.patientMeta span{display:block;color:var(--muted);font-size:10px;text-transform:uppercase;font-weight:800}
.allergy{color:var(--red);font-weight:900}.safety{padding:10px;border:2px solid var(--red);background:var(--redbg);color:var(--red);font-weight:900;margin:8px 0}.success{padding:10px;border:2px solid var(--ok);background:var(--okbg);color:var(--ok);font-weight:900;margin:8px 0}
.checks{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.check{display:flex;gap:8px;align-items:flex-start;border:1px solid var(--line);padding:8px;background:#fbfcfd}.check input{width:auto;margin:2px 0 0}
table{width:100%;border-collapse:collapse;font-size:13px}th,td{border:1px solid var(--line);padding:8px;text-align:left;vertical-align:top}th{background:#e7ecef}
.hidden{display:none!important}.barcodeCard{border:1px solid var(--line);padding:10px;margin:8px 0;background:#fff}
.labelControls{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:8px 0}
.labelPreview{border:1px dashed var(--line);padding:8px;background:#fafcfd;display:inline-block;max-width:100%}
.compactNote{font-size:11px;color:var(--muted);margin-top:5px}.actions{display:flex;gap:7px;flex-wrap:wrap}
.note{font-size:12px;color:var(--muted)}.modeBanner{padding:8px;background:#e9eef1;border:1px solid var(--line);margin-bottom:10px;font-size:12px}

.builderTabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.builderTabs button{border:1px solid var(--line);background:#e7ecef;padding:8px 11px;border-radius:4px}
.builderTabs button.active{background:var(--green2);color:white;border-color:var(--green2)}
.sectionTitle{margin:18px 0 8px;color:var(--green)}
.patientCards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.patientCard{border:1px solid var(--line);border-left:6px solid var(--green2);background:#fff;padding:12px;border-radius:5px}
.patientCard.inactive{opacity:.65;border-left-color:#7b8991}
.patientCard h3{margin:0 0 6px;color:var(--green)}
.patientCardMeta{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;font-size:12px;margin:8px 0}
.patientCardMeta span{display:block;color:var(--muted);font-size:10px;text-transform:uppercase;font-weight:800}
.resetBox{border:2px solid var(--warn);background:var(--warnbg);padding:10px;margin-top:10px}
@media(max-width:650px){.patientCards{grid-template-columns:1fr}}
.editRow{background:#fffdf0}
.dangerBtn{background:var(--red);color:white;border:0;padding:8px 11px;border-radius:4px}
.smallBtn{padding:5px 8px;font-size:12px}
.wide{grid-column:1/-1}
@media(max-width:820px){.layout{display:block}.patientMeta,.grid3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.grid,.grid3,.checks,.patientMeta{grid-template-columns:1fr}}
</style>
</head>

function save(){

  localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
  updateSaveStatus(true,"Saved in this browser");
  return true;
 }catch(e){
  updateSaveStatus(false,"Storage failed");
  alert("The browser could not save the chart data. Download a backup now and avoid private/incognito mode.");
  return false;
 }
}
function updateSaveStatus(ok,text){

 if(!b)return;
 b.textContent=text;
 b.className=`badge ${ok?"saved":"error"}`;
}
function verifyStoredData(){
 try{
  const raw=localStorage.getItem(STORAGE_KEY);
  if(!raw){updateSaveStatus(true,"Ready to save");return}
  const parsed=JSON.parse(raw);
  const patients=parsed.patients?.length||0;
  const meds=parsed.medications?.length||0;
  updateSaveStatus(true,`${patients} patients • ${meds} meds saved`);
 }catch(e){updateSaveStatus(false,"Saved data unreadable")}
}
function downloadDataBackup(){
 const backup={
  application:"ATU Simulation Hospital Medication & Blood Module",
  version:"v6",
  exportedAt:new Date().toISOString(),
  data:state
 };
 const blob=new Blob([JSON.stringify(backup,null,2)],{type:"application/json"});
 const url=URL.createObjectURL(blob);
 const a=document.createElement("a");
 a.href=url;
 a.download=`ATU_Simulation_Backup_${new Date().toISOString().slice(0,10)}.json`;
 document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
}
function restoreDataBackup(file){
 const reader=new FileReader();
 reader.onload=()=>{
  try{
   const parsed=JSON.parse(reader.result);
   const incoming=parsed.data||parsed;
   if(!Array.isArray(incoming.patients)||!Array.isArray(incoming.medications)){
    throw new Error("This file is not a valid ATU Simulation backup.");
   }
   if(!confirm(`Restore ${incoming.patients.length} patient(s) and ${incoming.medications.length} medication order(s)?\n\nThis will replace the data currently stored in this browser.`))return;
   state=incoming;
   state.bloodUnits ||= [];
   state.bloodAdministrations ||= [];
   state.administrations ||= [];
   state.settings ||= {bridgeUrl:"",notionEnabled:false};
   save();
   verifiedPatient=null;verifiedMedication=null;verifiedBloodPatient=null;verifiedBloodUnit=null;
   currentView="patients";
   alert("Backup restored successfully.");
   render();
  }catch(e){alert(e.message||"The backup file could not be restored.")}
 };
 reader.readAsText(file);
}

function resetPatientSimulation(id){
 const p=state.patients.find(x=>x.id===id);
 if(!p)return;
 const medCount=state.medications.filter(m=>m.patientId===id).length;
 const adminCount=state.administrations.filter(a=>a.patientId===id).length;
 if(!confirm(`Reset ${p.name}'s simulation?\n\nThis will:\n• Return ${medCount} medication order(s) to their starting MAR status\n• Delete ${adminCount} administration record(s) for this patient\n• Keep the patient, MAR, barcodes, and medication orders for reuse`))return;
 state.medications.filter(m=>m.patientId===id).forEach(m=>{
   m.status=m.initialStatus||"Due";
 });
 state.administrations=state.administrations.filter(a=>a.patientId!==id);
 state.bloodUnits.filter(b=>b.patientId===id).forEach(b=>b.status=b.initialStatus||"Available");
 state.bloodAdministrations=state.bloodAdministrations.filter(a=>a.patientId!==id);
 state.glucoseChecks=state.glucoseChecks.filter(g=>g.patientId!==id);
 if(verifiedPatient===id){verifiedMedication=null}
 save();
 alert(`${p.name}'s simulation has been reset. The same MAR is ready for the next student.`);
 render();
}
function resetAllActiveSimulations(){
 const active=state.patients.filter(p=>p.active!==false);
 if(!active.length)return alert("There are no active patients to reset.");
 if(!confirm(`Reset all ${active.length} active patient simulations?\n\nPatients and medication orders will be kept. Administration records will be cleared and MAR statuses restored.`))return;
 const ids=new Set(active.map(p=>p.id));
 state.medications.forEach(m=>{if(ids.has(m.patientId))m.status=m.initialStatus||"Due"});
 state.administrations=state.administrations.filter(a=>!ids.has(a.patientId));
 state.bloodUnits.forEach(b=>{if(ids.has(b.patientId))b.status=b.initialStatus||"Available"});
 state.bloodAdministrations=state.bloodAdministrations.filter(a=>!ids.has(a.patientId));
 state.glucoseChecks=state.glucoseChecks.filter(g=>!ids.has(g.patientId));
 verifiedMedication=null;
 save();
 alert("All active simulations have been reset.");
 render();
}

 if(!patientId)missing.push("Patient");

 if(!frequency)missing.push("Frequency");
 if(!scheduledTime)missing.push("Scheduled time");
 if(!provider)missing.push("Provider");
 if(medType==="PRN"&&!indication)missing.push("PRN indication");
 if(missing.length){
  alert(`Enter the following before saving:\n\n• ${missing.join("\n• ")}`);
  return;
 }
 if(!barcode){
  const p=state.patients.find(x=>x.id===patientId);
  barcode=`MED-${slugBarcode(name)}-${slugBarcode(dose)}-${slugBarcode(p?.mrn||patientId)}`;
 }
 const duplicate=state.medications.find(x=>x.barcode===barcode&&x.id!==editingMedicationId);
 if(duplicate)return alert("That medication barcode is already in use.");

 const record={patientId,medType,name,dose,route,frequency,scheduledTime,indication,provider,status,initialStatus:status,allergyKeywords,highAlert,barcode,notes};
 if(editingMedicationId)Object.assign(state.medications.find(x=>x.id===editingMedicationId),record);
 else state.medications.push({id:uid("med"),...record});
 save();editingMedicationId=null;renderMedicationBuilder();
}

async function administerMedication(){
 const p=activePatient(),m=state.medications.find(x=>x.id===verifiedMedication);
 const checks=[...document.querySelectorAll(".fiveRight")];
 if(checks.some(c=>!c.checked))return showAdminFeedback("Complete all required medication checks.",false);

 const student=document.getElementById("studentName").value.trim();
 if(!student)return showAdminFeedback("Enter the student nurse name.",false);
 const record={id:"ADM-"+Date.now(),patientId:p.id,patientName:p.name,mrn:p.mrn,medicationId:m.id,medication:m.name,dose:m.dose,route:m.route,scheduledTime:m.scheduledTime,administeredAt:document.getElementById("adminTime").value,student,site:document.getElementById("adminSite").value.trim(),notes:document.getElementById("adminNotes").value.trim(),barcode:m.barcode};
 state.administrations.push(record);m.status="Given";save();
 if(state.settings.notionEnabled&&state.settings.bridgeUrl){
  try{
   const res=await fetch(state.settings.bridgeUrl,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"createMedicationAdministration",record})});
   if(!res.ok)throw new Error(await res.text());
   showAdminFeedback("Medication documented locally and written to Notion.",true);
  }catch(err){showAdminFeedback("Medication documented locally, but the Notion write-back failed: "+err.message,false)}
 }else showAdminFeedback("Medication administration documented in demonstration mode.",true);
 verifiedMedication=null;setTimeout(render,1200);
}

function glucoseScaleResult(patientId,value){
 const order=insulinOrdersForPatient(patientId)[0];
 if(!order)return {order:null,dose:null,text:"No active insulin order"};
 const scale=order.insulinScale||[
  {min:0,max:149,dose:0,instruction:"No insulin"},{min:150,max:199,dose:2,instruction:"Give 2 units SQ"},
  {min:200,max:249,dose:4,instruction:"Give 4 units SQ"},{min:250,max:299,dose:6,instruction:"Give 6 units SQ"},
  {min:300,max:349,dose:8,instruction:"Give 8 units SQ"},{min:350,max:9999,dose:10,instruction:"Give 10 units SQ and notify provider"}
 ];
 const row=scale.find(r=>value>=r.min&&value<=r.max);
 return {order,dose:row?.dose??null,text:row?.instruction||"No scale result"};
}

 box.className=value<70||value>=350?"safety":"success";
 box.innerHTML=`<b>${esc(result.text)}</b>${alertText?`<br>${esc(alertText)}`:""}${result.dose>0?`<div class="grid" style="margin-top:10px">

let verifiedBloodPatient=null;

const RBC_COMPATIBILITY={
 "O-":["O-"],
 "O+":["O-","O+"],
 "A-":["O-","A-"],
 "A+":["O-","O+","A-","A+"],
 "B-":["O-","B-"],
 "B+":["O-","O+","B-","B+"],
 "AB-":["O-","A-","B-","AB-"],
 "AB+":["O-","O+","A-","A+","B-","B+","AB-","AB+"]
};
function isBloodCompatible(patientType,unitType,product){
 if(!patientType||!unitType)return false;
 if(product==="Fresh Frozen Plasma"){
   const plasma={
    "O-":["O-","O+","A-","A+","B-","B+","AB-","AB+"],
    "O+":["O+","A+","B+","AB+"],
    "A-":["A-","A+","AB-","AB+"],
    "A+":["A+","AB+"],
    "B-":["B-","B+","AB-","AB+"],
    "B+":["B+","AB+"],
    "AB-":["AB-","AB+"],
    "AB+":["AB+"]
   };
   return (plasma[unitType]||[]).includes(patientType);
 }
 if(product==="Platelets")return true;
 return (RBC_COMPATIBILITY[patientType]||[]).includes(unitType);
}

    <label>Copies<input class="patientLabelCopies" data-id="${esc(p.id)}" type="number" min="1" max="50" value="1"></label>
    <div style="align-self:end"><button class="secondary printPatientLabel" data-id="${esc(p.id)}">Print Patient Barcode</button></div>
   </div>
   <div class="compactNote">Barcode: ${esc(p.barcode)}</div>
 </div>`).join("")}
 <h3>Medication Labels</h3>
 ${state.medications.map(m=>{
   const p=state.patients.find(x=>x.id===m.patientId);
   return `<div class="barcodeCard">
    <b>${esc(m.name)} ${esc(m.dose)}</b>
    <p>${esc(m.route)} • ${esc(m.frequency)} • Patient: ${esc(p?.name||"Unknown")}</p>
    <div class="labelControls">
      <label>Label Size<select class="medLabelSize" data-id="${esc(m.id)}">
        <option value="tiny">Tiny — 1.5 × 0.75 in</option>
        <option value="small" selected>Small — 2 × 1 in</option>
        <option value="medium">Medium — 2.625 × 1 in</option>
        <option value="standard">Standard — 3.5 × 1.25 in</option>
      </select></label>
      <label>Copies<input class="medLabelCopies" data-id="${esc(m.id)}" type="number" min="1" max="100" value="6"></label>
      <div style="align-self:end"><button class="primary printMedicationLabel" data-id="${esc(m.id)}">Print Medication Labels</button></div>
    </div>
    <div class="compactNote">Barcode: ${esc(m.barcode)}</div>
   </div>`;
 }).join("")||"<p>No medications entered.</p>"}
 <h3>Blood Product Labels</h3>
 ${state.bloodUnits.map(b=>{
   const p=state.patients.find(x=>x.id===b.patientId);
   return `<div class="barcodeCard">
    <b>${esc(b.product)} — ${esc(b.unitType)} — Unit ${esc(b.unitNumber)}</b>
    <p>Patient: ${esc(p?.name||"Unknown")} • Expires: ${esc(b.expiration||"—")}</p>
    <div class="labelControls">
      <label>Label Size<select class="bloodLabelSize" data-id="${esc(b.id)}">
        <option value="small" selected>Small — 2 × 1 in</option>
        <option value="medium">Medium — 2.625 × 1 in</option>
        <option value="standard">Standard — 3.5 × 1.25 in</option>
      </select></label>
      <label>Copies<input class="bloodLabelCopies" data-id="${esc(b.id)}" type="number" min="1" max="50" value="2"></label>
      <div style="align-self:end"><button class="primary printBloodLabel" data-id="${esc(b.id)}">Print Blood Labels</button></div>
    </div>
    <div class="compactNote">Barcode: ${esc(b.barcode)}</div>
   </div>`;
 }).join("")||"<p>No blood products entered.</p>"}
`);
 document.querySelectorAll(".printPatientLabel").forEach(b=>b.onclick=()=>{
   const p=state.patients.find(x=>x.id===b.dataset.id);
   const size=document.querySelector(`.patientLabelSize[data-id="${b.dataset.id}"]`).value;
   const copies=document.querySelector(`.patientLabelCopies[data-id="${b.dataset.id}"]`).value;
   printLabelSheet({
     title:p.name,
     code:p.barcode,
     details:`MRN ${p.mrn} | DOB ${p.dob} | Room ${p.room} | ${p.provider}`,
     labelType:"patient",size,copies
   });
 });
 document.querySelectorAll(".printMedicationLabel").forEach(b=>b.onclick=()=>{
   const m=state.medications.find(x=>x.id===b.dataset.id);
   const p=state.patients.find(x=>x.id===m.patientId);
   const size=document.querySelector(`.medLabelSize[data-id="${b.dataset.id}"]`).value;
   const copies=document.querySelector(`.medLabelCopies[data-id="${b.dataset.id}"]`).value;
   printLabelSheet({
     title:`${m.name} ${m.dose}`,
     code:m.barcode,
     details:`${m.route} | ${m.frequency} | ${p?.name||""}`,
     labelType:"medication",size,copies
   });
 });
 document.querySelectorAll(".printBloodLabel").forEach(btn=>btn.onclick=()=>{
   const b=state.bloodUnits.find(x=>x.id===btn.dataset.id);
   const p=state.patients.find(x=>x.id===b.patientId);
   const size=document.querySelector(`.bloodLabelSize[data-id="${btn.dataset.id}"]`).value;
   const copies=document.querySelector(`.bloodLabelCopies[data-id="${btn.dataset.id}"]`).value;
   printLabelSheet({
     title:`${b.product} ${b.unitType}`,
     code:b.barcode,
     details:`Unit ${b.unitNumber} | ${p?.name||""} | Exp ${b.expiration||""}`,
     labelType:"blood",size,copies
   });
 });
}
function renderHistory(){
 const rows=state.administrations.slice().reverse().map(a=>`<tr><td>${esc(a.administeredAt)}</td><td>${esc(a.patientName)}</td><td>${esc(a.medication)} ${esc(a.dose)}</td><td>${esc(a.route)}</td><td>${esc(a.student)}</td><td>${esc(a.site)}</td><td>${esc(a.notes)}</td></tr>`).join("");
 document.getElementById("view").innerHTML=panel("Medication Administration History",`<table><thead><tr><th>Date/Time</th><th>Patient</th><th>Medication</th><th>Route</th><th>Student</th><th>Site</th><th>Notes</th></tr></thead><tbody>${rows||`<tr><td colspan="7">No administrations documented.</td></tr>`}</tbody></table>`);
}
function renderSettings(){
 document.getElementById("view").innerHTML=panel("Notion Connection",`
 <div class="modeBanner">Do not place a Notion secret token in this webpage. The app sends documentation to a secure bridge URL that stores the token on the server.</div>
 <div class="grid">
 <label>Notion Bridge URL<input id="bridgeUrl" value="${esc(state.settings.bridgeUrl)}" placeholder="https://your-worker.workers.dev"></label>
 <label>Connection Mode<select id="notionEnabled"><option value="false">Local demonstration mode</option><option value="true">Send administrations to Notion</option></select></label>
 </div>
 <div class="actions" style="margin-top:10px">
 <button id="saveSettings" class="primary">Save Connection Settings</button>
 <button id="settingsBackupBtn" class="secondary">Download Data Backup</button>
 <button id="settingsRestoreBtn" class="secondary">Restore Data Backup</button>
 <input id="settingsRestoreFile" type="file" accept=".json,application/json" class="hidden">
 <button id="resetAllSimulationsSettings" class="secondary">Reset All Patient Simulations</button>
 <button id="resetDemo" class="dangerBtn">Delete All Local Data</button>
 </div>
 <div class="storageHelp"><b>How saving works:</b><br>
 Data is saved only in this browser and website address. Always open the same GitHub Pages URL in the same browser. Do not use private/incognito mode. Download a backup after building or changing a patient MAR.</div>
 <p class="note">The Faculty Builder saves patients and medication orders in this browser. The included notion-worker.js is a starter secure bridge for completed administrations. Add your Notion token and Medication Administration database ID as protected environment variables on the hosting service.</p>`);
 document.getElementById("notionEnabled").value=String(state.settings.notionEnabled);
 document.getElementById("saveSettings").onclick=()=>{state.settings.bridgeUrl=document.getElementById("bridgeUrl").value.trim();state.settings.notionEnabled=document.getElementById("notionEnabled").value==="true";save();updateConnectionBadge();alert("Connection settings saved.")};
 document.getElementById("settingsBackupBtn").onclick=downloadDataBackup;
 document.getElementById("settingsRestoreBtn").onclick=()=>document.getElementById("settingsRestoreFile").click();
 document.getElementById("settingsRestoreFile").onchange=e=>{if(e.target.files?.[0])restoreDataBackup(e.target.files[0])};
 document.getElementById("resetAllSimulationsSettings").onclick=()=>{
   if(!confirm("Reset every patient simulation while keeping all patients and medication orders?"))return;
   state.medications.forEach(m=>m.status=m.initialStatus||"Due");
   state.administrations=[];state.bloodUnits.forEach(b=>b.status=b.initialStatus||"Available");state.bloodAdministrations=[];state.glucoseChecks=[];
   verifiedPatient=null;verifiedMedication=null;save();alert("All simulations reset.");renderSettings();
 };
 document.getElementById("resetDemo").onclick=()=>{if(confirm("DELETE all local patients, medications, and administration records? This cannot be undone.")){localStorage.removeItem(STORAGE_KEY);location.reload()}};
}
function updateConnectionBadge(){
 const b=document.getElementById("connectionBadge");
 b.textContent=state.settings.notionEnabled&&state.settings.bridgeUrl?"Notion Write-Back Enabled":"Local Demonstration Mode";
}
document.querySelectorAll("aside button").forEach(b=>b.onclick=()=>{currentView=b.dataset.view;render()});
updateConnectionBadge();verifyStoredData();render();
setTimeout(()=>updateSaveStatus(true,`${state.patients.length} patients • ${state.medications.length} meds loaded`),100);
</script>
</body>
</html>
